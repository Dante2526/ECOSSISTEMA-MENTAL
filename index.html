<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecossistema Mental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <!-- TODO: Para produção, instalar Tailwind como dependência e remover o CDN abaixo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Exo 2"', 'sans-serif'],
          },
          animation: {
            'dot-pulse': 'dotPulse 1.4s ease-in-out infinite both',
            'sonar-pulse': 'sonar-pulse 2s ease-out infinite',
            'travel-line': 'travel-line 2.5s linear infinite',
          },
          keyframes: {
            dotPulse: {
              '0%, 80%, 100%': { transform: 'scale(0.8)', opacity: '0.5' },
              '40%': { transform: 'scale(1.2)', opacity: '1' },
            },
            'sonar-pulse': {
              '0%': { transform: 'scale(0.5)', opacity: '0' },
              '50%': { opacity: '0.8' },
              '100%': { transform: 'scale(2.5)', opacity: '0' },
            },
            'travel-line': {
              '0%': { 'background-position': '-60% 0' },
              '100%': { 'background-position': '160% 0' },
            },
          },
        },
      },
    }
  </script>
  <style>
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Exo 2', sans-serif;
    }

    .connection-line::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.8) 50%, transparent 100%);
      background-size: 40% 100%;
      animation: travel-line 2.5s linear infinite;
      opacity: 0.8;
    }

    /* Custom Scrollbar for Webkit browsers */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
      /* slate-800 com transparência */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background-color: rgba(100, 116, 139, 0.5);
      /* slate-500 com transparência */
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(148, 163, 184, 0.7);
      /* slate-400 com transparência */
    }

    .safe-area-pb {
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    /* react-zoom-pan-pinch: force wrapper/component to fill parent and center content */
    .react-transform-wrapper {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .react-transform-component {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
  </style>
  <script type="module" src="/index.tsx"></script>

</head>

<body class="bg-slate-900">
  <div id="root"></div>
</body>

</html>
